<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light p-5">

    <div class="container">
        <h1>لوحة التحكم</h1>
        <div id="testArea" class="mt-4 p-3 border">
            <button id="btnTest" class="btn btn-primary">اضغط للاختبار</button>
            <p id="result" class="mt-2"></p>
        </div>
    </div>

    <script>
        // 1. اختبار هل الجافا سكريبت يعمل أصلاً؟
        document.getElementById('btnTest').onclick = () => {
            document.getElementById('result').innerText = "الجافا سكريبت يعمل بنجاح!";
        };

        // 2. التحقق من المستخدم
        const user = localStorage.getItem('user');
        if (!user) {
            console.log("لا يوجد مستخدم، جاري التوجيه...");
            // window.location.href = 'login.html'; 
            // قمت بتعليق التوجيه عشان تقدر تشوف الصفحة وتتأكد إنها فتحت
        } else {
            console.log("المستخدم موجود:", JSON.parse(user));
        }
    </script>
</body>
</html>
