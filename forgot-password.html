<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - Live Store</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2230%22 font-size=%2222%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22%23d4af37%22 text-anchor=%22middle%22>Live Store</text><text x=%2250%%22 y=%2285%22 font-size=%2250%22 text-anchor=%22middle%22>🚀</text></svg>">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        } 

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #262626;
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            color: #d4af37;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        p {
            font-size: 14px;
            color: #aaa;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #d4af37;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #ffffff;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            text-align: left;
            direction: ltr;
        }

        input[type="email"]:focus {
            border-color: #d4af37;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #b8952e;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: #aaa;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #d4af37;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .error {
            background-color: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Live Store</div>
    <h2>استعادة كلمة المرور</h2>
    <p>أدخل بريدك الإلكتروني المسجل وسنقوم بإرسال رمز تعيين سري مكون من 6 أرقام إليك.</p>

    <form id="forgotForm">
        <div class="form-group">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <button type="submit" id="submitBtn">إرسال رمز التحقق</button>
    </form>

    <div id="msgBox" class="message"></div>

    <div class="links">
        <a href="/login.html">العودة لتسجيل الدخول</a>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('msgBox');

        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري الإرسال...';
        msgBox.style.display = 'none';

        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: emailInput.value })
            });

            const data = await res.json();

            if (data.success) {
                msgBox.className = 'message success';
                msgBox.innerText = data.message;
                msgBox.style.display = 'block';

                setTimeout(() => {
                    window.location.href = '/verify-otp.html';
                }, 2000);

            } else {
                msgBox.className = 'message error';
                msgBox.innerText = data.message;
                msgBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'إرسال رمز التحقق';
            }

        } catch (error) {
            msgBox.className = 'message error';
            msgBox.innerText = 'حدث خطأ في الاتصال بالسيرفر، حاول مجدداً.';
            msgBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerText = 'إرسال رمز التحقق';
        }
    });
</script>

</body>
</html>
