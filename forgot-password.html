<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - Live Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #d4af37 !important; 
        }
        .forgot-container { 
            max-width: 500px; 
            width: 95%; 
            margin: 100px auto; 
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
            padding: 40px !important;
        }
        .text-gold, .form-label, h2, p { color: #d4af37 !important; }
        .form-control {
            background-color: #262626;
            border: 1px solid #444;
            color: #d4af37 !important;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #2d2d2d;
            border-color: #d4af37 !important;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        .btn-gold {
            background-color: #d4af37;
            color: #121212;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-gold:hover { background-color: #f3e5ab; transform: translateY(-2px); }
        a { color: #ffffff !important; text-decoration: none; font-weight: bold; }
        a:hover { color: #f3e5ab !important; }
        
        .error-message {
            font-size: 0.85rem;
            color: #ff6b6b !important;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container forgot-container">
        <div class="card shadow">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-gold" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">نسيت كلمة المرور؟</h2>
                <p class="text-muted small mt-2" style="color: #aaa !important;">أدخل بريدك الإلكتروني المسجل وسنقوم بإرسال رابط أو كود لإعادة تعيين كلمة المرور.</p>
            </div>
            
            <div id="formStatusAlert" class="alert d-none mb-3 text-center" role="alert" style="font-size: 0.95rem; border-radius: 6px;"></div>

            <form id="forgotForm" novalidate>
                <div class="mb-4">
                    <label class="form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="name@example.com" required>
                    <div class="error-message d-none" id="emailError">الرجاء إدخال بريد إلكتروني صحيح.</div>
                </div>
                
                <button type="submit" class="btn btn-gold">إرسال رابط الاستعادة</button>
            </form>

            <div class="text-center mt-4">
                <p class="small mb-0"><a href="login.html"><i class="bi bi-arrow-right me-1"></i> العودة لتسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').onsubmit = async (e) => {
            e.preventDefault();
            
            document.getElementById('emailError').classList.add('d-none');
            const statusAlert = document.getElementById('formStatusAlert');
            statusAlert.classList.add('d-none');
            statusAlert.className = 'alert d-none mb-3 text-center';

            const email = document.getElementById('forgotEmail').value.trim();

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').classList.remove('d-none');
                document.getElementById('forgotEmail').focus();
                return;
            }

            try {
                statusAlert.classList.remove('d-none');
                statusAlert.style.cssText = "background-color: rgba(255, 193, 7, 0.15); color: #f1c40f; border: 1px solid #f1c40f;";
                statusAlert.innerText = 'جاري التحقق وإرسال البيانات...';

                // الـ fetch متظبط يضرب على فولدر الـ api
                const res = await fetch('/api/forgot-password', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    statusAlert.style.cssText = "background-color: rgba(40, 167, 69, 0.2); color: #2ecc71; border: 1px solid #2ecc71;";
                    statusAlert.innerText = 'إذا كان البريد مسجلاً لدينا، فقد أرسلنا كود إعادة التعيين بنجاح!';
                } else {
                    statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                    statusAlert.innerText = data.message || 'حدث خطأ ما، يرجى المحاولة لاحقاً.';
                }
            } catch (error) {
                console.error('Forgot Password Error:', error);
                statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                statusAlert.innerText = 'تعذر الاتصال بالسيرفر، تأكد من تشغيل الباك أند.';
            }
        };
    </script>
</body>
</html>
