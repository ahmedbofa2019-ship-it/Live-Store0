<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - Live Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 280 70%22><text x=%2250%%22 y=%2248%22 font-size=%2242%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22%23d4af37%22 text-anchor=%22middle%22>Live Store</text></svg>">
    <style>
        body { background-color: #121212; color: #d4af37 !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .register-container { max-width: 500px; width: 95%; margin: 50px auto; }
        .card { background-color: #1a1a1a; border: 1px solid #d4af37; border-radius: 12px; padding: 40px !important; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important; }
        .text-gold { color: #d4af37 !important; }
        .form-control { background-color: #262626 !important; border: 1px solid #444 !important; color: #d4af37 !important; padding: 12px; }
        .form-control:focus { background-color: #2d2d2d; border-color: #d4af37 !important; box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25); }
        .role-box { background-color: #262626; border: 2px solid #444; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s ease-in-out; user-select: none; color: #d4af37 !important; }
        .role-box:hover { border-color: #f3e5ab; transform: translateY(-2px); }
        .role-box.selected { border-color: #d4af37 !important; background-color: rgba(212, 175, 55, 0.1) !important; }
        .btn-gold { background-color: #d4af37; color: #121212; font-weight: bold; padding: 12px; width: 100%; margin-top: 20px; border: none; border-radius: 6px; transition: all 0.2s; }
        .btn-gold:hover { background-color: #f3e5ab; transform: translateY(-2px); }
        .btn-gold:disabled { background-color: #888; cursor: not-allowed; }
        .error-message { font-size: 0.85rem; color: #ff6b6b !important; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container register-container">
        <div class="card shadow">
            <h2 class="text-gold text-center fw-bold mb-4">إنشاء حساب جديد</h2>
            <div id="formStatusAlert" class="alert d-none mb-3 text-center" role="alert" style="font-size: 0.95rem; border-radius: 6px;"></div>

            <form id="registerForm" novalidate>
                <div class="mb-4">
                    <label class="text-gold form-label fw-semibold mb-2">سجل كـ:</label>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="role-box" id="roleCustomer" onclick="selectRole('customer')">
                                <i class="bi bi-person-fill fs-3 mb-1 d-block"></i>
                                <span>عميل</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="role-box" id="roleOwner" onclick="selectRole('owner')">
                                <i class="bi bi-briefcase-fill fs-3 mb-1 d-block"></i>
                                <span>صاحب عمل</span>
                            </div>
                        </div>
                    </div>
                    <div class="error-message d-none" id="roleError">الرجاء تحديد نوع الحساب.</div>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">الاسم المستعار / اسم المحل</label>
                    <input type="text" id="regName" class="form-control" placeholder="أدخل اسمك أو اسم محلك" required>
                    <div class="error-message d-none" id="nameError">الرجاء إدخال اسم صحيح.</div>
                </div>

                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
                    <div class="error-message d-none" id="emailError">الرجاء إدخال بريد إلكتروني صحيح.</div>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">كلمة المرور</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="********" required>
                    <div class="error-message d-none" id="passwordError">يجب ألا تقل عن 6 خانات.</div>
                </div>
                
                <button type="submit" class="btn btn-gold">إنشاء الحساب</button>
            </form>
        </div>
    </div>

    <script>
        let selectedRole = null;
        const registerForm = document.getElementById('registerForm');
        const submitBtn = registerForm.querySelector('button[type="submit"]');

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleCustomer').classList.remove('selected');
            document.getElementById('roleOwner').classList.remove('selected');
            document.getElementById(`role${role.charAt(0).toUpperCase() + role.slice(1)}`).classList.add('selected');
            document.getElementById('roleError').classList.add('d-none');
        }

        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            document.querySelectorAll('.error-message').forEach(el => el.classList.add('d-none'));
            const statusAlert = document.getElementById('formStatusAlert');
            statusAlert.classList.add('d-none');

            let hasError = false;
            if (!selectedRole) { document.getElementById('roleError').classList.remove('d-none'); hasError = true; }

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (name.length < 2) { document.getElementById('nameError').classList.remove('d-none'); hasError = true; }
            if (!emailRegex.test(email)) { document.getElementById('emailError').classList.remove('d-none'); hasError = true; }
            if (password.length < 6) { document.getElementById('passwordError').classList.remove('d-none'); hasError = true; }

            if (hasError) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'جاري الإنشاء...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: selectedRole, name, email, password })
                });

                const data = await res.json();
                statusAlert.classList.remove('d-none');
                
                if (data.success) {
                    statusAlert.style.cssText = "background-color: rgba(40, 167, 69, 0.2); color: #2ecc71; border: 1px solid #2ecc71;";
                    statusAlert.innerText = 'تم تسجيل حسابك بنجاح!';
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                    statusAlert.innerText = data.message || 'خطأ في التسجيل';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'إنشاء الحساب';
                }
            } catch (error) {
                statusAlert.classList.remove('d-none');
                statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                statusAlert.innerText = 'تعذر الاتصال بالسيرفر';
                submitBtn.disabled = false;
                submitBtn.innerText = 'إنشاء الحساب';
            }
        };
    </script>
</body>
</html>
