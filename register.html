<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - Live Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #121212; 
            color: #d4af37 !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .register-container { 
            max-width: 500px; 
            width: 95%; 
            margin: 80px auto; 
        }
        .card { 
            background-color: #1a1a1a; 
            border: 1px solid #d4af37; 
            border-radius: 12px; 
            padding: 40px !important; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
        }
        .text-gold { color: #d4af37 !important; }
        .form-control, .form-select { 
            background-color: #262626 !important; 
            border: 1px solid #444 !important; 
            color: #d4af37 !important; 
            padding: 12px; 
        }
        .form-control:focus, .form-select:focus {
            background-color: #2d2d2d;
            border-color: #d4af37 !important;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        .btn-gold { 
            background-color: #d4af37; 
            color: #121212; 
            font-weight: bold; 
            padding: 12px; 
            width: 100%; 
            margin-top: 20px; 
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-gold:hover { 
            background-color: #f3e5ab; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container register-container">
        <div class="card shadow">
            <h2 class="text-gold text-center fw-bold mb-4">إنشاء حساب جديد</h2>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">سجل كـ:</label>
                    <select id="regRole" class="form-select" required>
                        <option value="customer">عميل (مستخدم)</option>
                        <option value="owner">صاحب عمل</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">كلمة المرور</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="********" required>
                </div>
                
                <button type="submit" class="btn btn-gold">تسجيل الحساب</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // تجميع البيانات من الفورم
            const role = document.getElementById('regRole').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                // إرسال طلب POST للباك أند
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ role, email, password })
                });

                const data = await res.json();
                
                // لو السيرفر رد بالنجاح وتم التخزين
                if (data.success) {
                    alert('تم تسجيل حسابك وتخزينه في الداتا بيز بنجاح!');
                    window.location.href = 'index.html'; // يوجهه لصفحة الدخول
                } else {
                    alert('حدثت مشكلة أثناء التسجيل في الداتا بيز');
                }
            } catch (error) {
                alert('خطأ: تعذر الاتصال بالسيرفر والباك أند');
                console.error(error);
            }
        };
    </script>

</body>
</html>
