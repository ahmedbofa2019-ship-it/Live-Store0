<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - Live Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #d4af37 !important; font-family: sans-serif; }
        .register-container { max-width: 500px; width: 95%; margin: 80px auto; }
        .card { background-color: #1a1a1a; border: 1px solid #d4af37; border-radius: 12px; padding: 40px !important; }
        .text-gold { color: #d4af37 !important; }
        .form-control, .form-select { background-color: #262626 !important; border: 1px solid #444 !important; color: #d4af37 !important; padding: 12px; }
        .btn-gold { background-color: #d4af37; color: #121212; font-weight: bold; padding: 12px; width: 100%; margin-top: 20px; }
        .btn-gold:hover { background-color: #f3e5ab; }
    </style>
</head>
<body>
    <div class="container register-container">
        <div class="card shadow">
            <h2 class="text-gold text-center fw-bold mb-4">إنشاء حساب جديد</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="text-gold">سجل كـ:</label>
                    <select id="regRole" class="form-select" required>
                        <option value="customer">عميل (مستخدم)</option>
                        <option value="owner">صاحب عمل</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold">كلمة المرور</label>
                    <input type="password" id="regPassword" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-gold">تسجيل الحساب</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                role: document.getElementById('regRole').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            if(data.success) {
                alert('تم التسجيل بنجاح!');
                window.location.href = 'index.html';
            } else {
                alert('فشل التسجيل، حاول مرة أخرى');
            }
        };
    </script>
</body>
</html>
