<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - Live Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            background-color: #121212; 
            color: #d4af37 !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .register-container { 
            max-width: 500px; 
            width: 95%; 
            margin: 50px auto; 
        }
        .card { 
            background-color: #1a1a1a; 
            border: 1px solid #d4af37; 
            border-radius: 12px; 
            padding: 40px !important; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
        }
        .text-gold { color: #d4af37 !important; }
        .form-control { 
            background-color: #262626 !important; 
            border: 1px solid #444 !important; 
            color: #d4af37 !important; 
            padding: 12px; 
        }
        .form-control:focus {
            background-color: #2d2d2d;
            border-color: #d4af37 !important;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        
        /* تصميم كروت اختيار الدور (عميل / صاحب عمل) باللون الذهبي */
        .role-box {
            background-color: #262626;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            user-select: none;
            color: #d4af37 !important;
        }
        .role-box:hover {
            border-color: #f3e5ab;
            transform: translateY(-2px);
        }
        /* كلاس التحديد النشط */
        .role-box.selected {
            border-color: #d4af37 !important;
            background-color: rgba(212, 175, 55, 0.1) !important;
        }
        
        .btn-gold { 
            background-color: #d4af37; 
            color: #121212; 
            font-weight: bold; 
            padding: 12px; 
            width: 100%; 
            margin-top: 20px; 
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-gold:hover { 
            background-color: #f3e5ab; 
            transform: translateY(-2px);
        }

        /* تصميم زرار جوجل الاحترافي */
        .btn-google {
            background-color: #ffffff;
            border: 1px solid #e4e4e4;
            color: #1f1f1f;
            font-weight: 500;
            padding: 12px;
            width: 100%;
            margin-top: 15px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background-color: #f7f7f7;
            border-color: #ccc;
            color: #000000;
        }
        .btn-google i {
            color: #ea4335; 
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #666;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #444;
        }
        .divider:not(:empty)::before { margin-left: .25em; }
        .divider:not(:empty)::after { margin-right: .25em; }

        /* ستايل مخصص لرسائل الخطأ الأنيقة تحت الخانات */
        .error-message {
            font-size: 0.85rem;
            color: #ff6b6b !important;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container register-container">
        <div class="card shadow">
            <h2 class="text-gold text-center fw-bold mb-4">إنشاء حساب جديد</h2>
            
            <div id="formStatusAlert" class="alert d-none mb-3 text-center" role="alert" style="font-size: 0.95rem; border-radius: 6px;"></div>

            <form id="registerForm" novalidate>
                
                <div class="mb-4">
                    <label class="text-gold form-label fw-semibold mb-2">سجل كـ:</label>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="role-box" id="roleCustomer" onclick="selectRole('customer')">
                                <i class="bi bi-person-fill fs-3 mb-1 d-block"></i>
                                <span>عميل (مستخدم)</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="role-box" id="roleOwner" onclick="selectRole('owner')">
                                <i class="bi bi-briefcase-fill fs-3 mb-1 d-block"></i>
                                <span>صاحب عمل</span>
                            </div>
                        </div>
                    </div>
                    <div class="error-message d-none" id="roleError">الرجاء تحديد نوع الحساب أولاً (عميل أو صاحب عمل).</div>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" required>
                    <div class="error-message d-none" id="emailError">الرجاء إدخال بريد إلكتروني صحيح .</div>
                </div>
                
                <div class="mb-3">
                    <label class="text-gold form-label fw-semibold">كلمة المرور</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="********" required>
                    <div class="error-message d-none" id="passwordError">يجب أن لا تقل كلمة المرور عن 6 حروف وارقام.</div>
                </div>
                
                <button type="submit" class="btn btn-gold">إنشاء الحساب</button>

                <div class="divider">أو</div>
                
                <button type="button" id="googleSignUpBtn" class="btn btn-google">
                    <i class="bi bi-google"></i> التسجيل باستخدام Google
                </button>
            </form>
        </div>
    </div>

    <script>
        let selectedRole = null;

        // دالة اختيار الدور
        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleCustomer').classList.remove('selected');
            document.getElementById('roleOwner').classList.remove('selected');
            
            if (role === 'customer') {
                document.getElementById('roleCustomer').classList.add('selected');
            } else if (role === 'owner') {
                document.getElementById('roleOwner').classList.add('selected');
            }
            
            // إخفاء رسالة خطأ الدور بمجرد الاختيار
            document.getElementById('roleError').classList.add('d-none');
        }

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // إعادة تهيئة وإخفاء كل رسائل الخطأ والصناديق السابقة
            document.getElementById('roleError').classList.add('d-none');
            document.getElementById('emailError').classList.add('d-none');
            document.getElementById('passwordError').classList.add('d-none');
            
            const statusAlert = document.getElementById('formStatusAlert');
            statusAlert.classList.add('d-none');
            statusAlert.className = 'alert d-none mb-3 text-center'; // ريست للكلاسات

            let hasError = false;

            // 1. التحقق من اختيار الدور
            if (!selectedRole) {
                document.getElementById('roleError').classList.remove('d-none');
                hasError = true;
            }

            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            // 2. التحقق من الإيميل
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').classList.remove('d-none');
                if(!hasError) document.getElementById('regEmail').focus();
                hasError = true;
            }

            // 3. التحقق من طول كلمة المرور
            if (password.length < 6) {
                document.getElementById('passwordError').classList.remove('d-none');
                if(!hasError && selectedRole && emailRegex.test(email)) document.getElementById('regPassword').focus();
                hasError = true;
            }

            // لو فيه أي خطأ في المدخلات نوقف الإرسال فوراً
            if (hasError) return;

            // لو البيانات سليمة، نطير للباك أند ونظهر النتيجة بشكل شيك
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ role: selectedRole, email, password })
                });

                const data = await res.json();
                
                if (data.success) {
                    // إظهار تنبيه أخضر شيك جداً للنجاح
                    statusAlert.classList.remove('d-none');
                    statusAlert.classList.add('alert-success');
                    statusAlert.style.cssText = "background-color: rgba(40, 167, 69, 0.2); color: #2ecc71; border: 1px solid #2ecc71;";
                    statusAlert.innerText = 'تم تسجيل حسابك بنجاح!';
                    
                    // توجيه تلقائي بعد ثانيتين عشان يلحق يشوف الرسالة الشيك
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);

                } else {
                    // خطأ من قاعدة البيانات أو السيرفر (مثلاً الإيميل مستخدم قبل كده)
                    statusAlert.classList.remove('d-none');
                    statusAlert.classList.add('alert-danger');
                    statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                    statusAlert.innerText = data.message || 'حدثت مشكلة أثناء التسجيل في الداتا بيز';
                }
            } catch (error) {
                // فشل الاتصال بالشبكة أو السيرفر مغلق
                statusAlert.classList.remove('d-none');
                statusAlert.classList.add('alert-danger');
                statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                statusAlert.innerText = 'تعذر الاتصال بالسيرفر، تأكد من تشغيل الباك أند.';
                console.error(error);
            }
        };

        // زرار جوجل الشيك
        document.getElementById('googleSignUpBtn').onclick = () => {
            const statusAlert = document.getElementById('formStatusAlert');
            statusAlert.className = 'alert mb-3 text-center';
            statusAlert.classList.remove('d-none');
            statusAlert.style.cssText = "background-color: rgba(255, 193, 7, 0.15); color: #f1c40f; border: 1px solid #f1c40f;";
            statusAlert.innerText = 'جاري فتح نافذة Google OAuth للتحقق...';
        };
    </script>

</body>
</html>
