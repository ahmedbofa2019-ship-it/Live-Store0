<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد رمز التحقق - Live Store</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 280 70%22><text x=%2250%%22 y=%2248%22 font-size=%2242%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22%23d4af37%22 text-anchor=%22middle%22>Live Store</text></svg>">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        } 

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #262626;
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 45px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .logo {
            text-align: center;
            color: #d4af37;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        h2 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 18px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 15px;
            margin-bottom: 10px;
            color: #d4af37;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #ffffff;
            border-radius: 6px;
            font-size: 22px;
            letter-spacing: 8px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #b8952e;
        }

        .links {
            margin-top: 25px;
            text-align: center;
        }

        .links a {
            color: #aaa;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #d4af37;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            display: none;
        }

        .success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .error {
            background-color: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Live Store</div>
    <h2>تأكيد رمز التحقق</h2>
    <p>برجاء إدخال الرمز المكون من 6 أرقام الذي أرسلناه إلى بريدك الإلكتروني.</p>

    <form id="verifyForm">
        <div class="form-group">
            <label for="otpCode">رمز التحقق (OTP)</label>
            <input type="text" id="otpCode" placeholder="000000" maxlength="6" pattern="\d{6}" required>
        </div>
        <button type="submit" id="submitBtn">تأكيد الرمز</button>
    </form>

    <div id="msgBox" class="message"></div>

    <div class="links">
        <a href="/forgot-password.html">إعادة إرسال الرمز</a>
    </div>
</div>

<script>
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const otpInput = document.getElementById('otpCode');
        const submitBtn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('msgBox');

        // سحب الـ Token المشفر من الـ localStorage
        const otpToken = localStorage.getItem('otpToken');

        if (!otpToken) {
            msgBox.className = 'message error';
            msgBox.innerText = 'حدث خطأ، يرجى العودة لصفحة نسيت كلمة المرور أولاً.';
            msgBox.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري التحقق...';
        msgBox.style.display = 'none';

        try {
            // 🌟 تم تعديل المسار هنا ليكون نسبي ليقرأ من Vercel مباشرة دون مشاكل الـ Localhost
            const res = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    userOtp: otpInput.value.trim(),
                    otpToken: otpToken
                })
            });

            const data = await res.json();

            if (data.success) {
                msgBox.className = 'message success';
                msgBox.innerText = data.message;
                msgBox.style.display = 'block';

                // مسح التوكن بعد النجاح كزيادة أمان
                localStorage.removeItem('otpToken');

                // تحويل المستخدم لصفحة تعيين الباسورد الجديد
                setTimeout(() => {
                    window.location.href = '/reset-password.html';
                }, 2000);

            } else {
                msgBox.className = 'message error';
                msgBox.innerText = data.message;
                msgBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'تأكيد الرمز';
            }

        } catch (error) {
            msgBox.className = 'message error';
            msgBox.innerText = 'حدث خطأ في الاتصال بالسيرفر، حاول مجدداً.';
            msgBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerText = 'تأكيد الرمز';
        }
    });
</script>

</body>
</html>
