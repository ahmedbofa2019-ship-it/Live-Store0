<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد رمز التحقق - Live Store</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; } 
        body { background-color: #1a1a1a; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: #262626; border: 1px solid #d4af37; border-radius: 12px; padding: 45px; width: 100%; max-width: 520px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6); }
        .logo { text-align: center; color: #d4af37; font-size: 36px; font-weight: bold; margin-bottom: 25px; }
        h2 { text-align: center; font-size: 24px; margin-bottom: 18px; }
        p { font-size: 16px; color: #aaa; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #444; background-color: #1a1a1a; color: #ffffff; border-radius: 6px; font-size: 22px; letter-spacing: 8px; text-align: center; outline: none; }
        button { width: 100%; padding: 14px; background-color: #d4af37; color: #1a1a1a; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #888; cursor: not-allowed; }
        .message { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 15px; text-align: center; display: none; }
        .success { background-color: rgba(40, 167, 69, 0.2); color: #28a745; border: 1px solid #28a745; }
        .error { background-color: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Live Store</div>
    <h2>تأكيد رمز التحقق</h2>
    <p>برجاء إدخال الرمز المكون من 6 أرقام الذي أرسلناه إلى بريدك الإلكتروني.</p>

    <form id="verifyForm">
        <div class="form-group">
            <input type="text" id="otpCode" placeholder="000000" maxlength="6" pattern="\d{6}" required>
        </div>
        <button type="submit" id="submitBtn">تأكيد الرمز</button>
    </form>

    <div id="msgBox" class="message"></div>
</div>

<script>
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const otpInput = document.getElementById('otpCode');
        const submitBtn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('msgBox');

        // جلب التوكن المؤقت الذي حفظناه في الخطوة السابقة
        const otpToken = localStorage.getItem('otpToken');

        if (!otpToken) {
            msgBox.className = 'message error';
            msgBox.innerText = 'انتهت صلاحية الجلسة، يرجى إعادة طلب الرمز.';
            msgBox.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري التحقق...';
        msgBox.style.display = 'none';

        try {
            const res = await fetch('/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userOtp: otpInput.value.trim(),
                    otpToken: otpToken 
                })
            });

            const data = await res.json();

            if (data.success) {
                msgBox.className = 'message success';
                msgBox.innerText = data.message;
                msgBox.style.display = 'block';

                // حفظ التوكن الجديد الخاص بتغيير الباسورد
                if (data.resetToken) {
                    localStorage.setItem('resetToken', data.resetToken);
                }
                
                // مسح التوكن القديم
                localStorage.removeItem('otpToken');

                // الانتقال لصفحة تعيين كلمة المرور الجديدة
                setTimeout(() => {
                    window.location.href = '/reset-password.html';
                }, 1500);
            } else {
                msgBox.className = 'message error';
                msgBox.innerText = data.message;
                msgBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'تأكيد الرمز';
            }
        } catch (error) {
            msgBox.className = 'message error';
            msgBox.innerText = 'حدث خطأ في الاتصال، حاول مجدداً.';
            msgBox.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerText = 'تأكيد الرمز';
        }
    });
</script>

</body>
</html>
