<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة البيع المباشر</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #d4af37 !important; 
        }
        .login-container { 
            max-width: 600px; 
            width: 95%; 
            margin: 100px auto; 
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
            padding: 40px !important;
        }
        .text-gold, .form-label, h4, h2, p { color: #d4af37 !important; }
        .form-control {
            background-color: #262626;
            border: 1px solid #444;
            color: #d4af37 !important;
            padding: 12px;
        }
        .btn-gold {
            background-color: #d4af37;
            color: #121212;
            font-weight: bold;
            padding: 12px;
            transition: all 0.2s;
        }
        .btn-gold:hover { background-color: #f3e5ab; transform: translateY(-2px); }
        a { color: #ffffff !important; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="card shadow">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Live Store</h2>
                <h4 class="fw-bold mt-3">أهلا بك في منصة البيع المباشر!</h4>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">كلمة المرور</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-gold w-100 mt-3">دخول</button>
            </form>

            <div class="text-center mt-4">
                <p class="small mb-0">ليس لديك حساب؟ <a href="register.html">أنشئ حسابك الآن</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                // تم التعديل لـ /api/login بناءً على الـ routes المكتوبة في vercel.json
                const res = await fetch('/api/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message); 
                    
                    // حفظ بيانات المستخدم في الـ LocalStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // التوجيه لصفحة الـ Dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'بيانات الدخول غير صحيحة');
                }
            } catch (error) {
                console.error('Login Error:', error);
                alert('حدث خطأ في الاتصال بالسيرفر، تأكد من جودة الإنترنت.');
            }
        };
    </script>
</body>
</html>
