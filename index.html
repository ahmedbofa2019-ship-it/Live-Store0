<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة البيع المباشر</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="icon" type="image/jpeg" href="./logo.jpeg">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #d4af37 !important; 
        }
        .login-container { 
            max-width: 600px; 
            width: 95%; 
            margin: 80px auto; 
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
            padding: 40px !important;
        }
        .text-gold, .form-label, h4, h2, p { color: #d4af37 !important; }
        .form-control {
            background-color: #262626;
            border: 1px solid #444;
            color: #d4af37 !important;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #2d2d2d;
            border-color: #d4af37 !important;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        .btn-gold {
            background-color: #d4af37;
            color: #121212;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-gold:hover { background-color: #f3e5ab; transform: translateY(-2px); }
        a { color: #ffffff !important; text-decoration: none; font-weight: bold; }
        a:hover { color: #f3e5ab !important; }

        /* ستايل مخصص لرابط نسيت كلمة المرور باللون الذهبي */
        .forgot-link {
            color: #d4af37 !important;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: #f3e5ab !important;
        }

        /* زرار جوجل الأبيض الاحترافي */
        .btn-google {
            background-color: #ffffff;
            border: 1px solid #e4e4e4;
            color: #1f1f1f;
            font-weight: 500;
            padding: 12px;
            width: 100%;
            margin-top: 15px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background-color: #f7f7f7;
            border-color: #ccc;
            color: #000000;
        }
        .btn-google i { color: #ea4335; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #666;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #444;
        }
        .divider:not(:empty)::before { margin-left: .25em; }
        .divider:not(:empty)::after { margin-right: .25em; }

        /* ستايل مخصص لرسائل الخطأ الأنيقة تحت الخانات */
        .error-message {
            font-size: 0.85rem;
            color: #ff6b6b !important;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="card shadow">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Live Store</h2>
                <h4 class="fw-bold mt-3">أهلاً بك في منصة البيع المباشر!</h4>
            </div>
            
            <div id="formStatusAlert" class="alert d-none mb-3 text-center" role="alert" style="font-size: 0.95rem; border-radius: 6px;"></div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com" required>
                    <div class="error-message d-none" id="emailError">الرجاء إدخال بريد إلكتروني صحيح ومطابق للشروط العالمية.</div>
                </div>
                
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label fw-semibold mb-0">كلمة المرور</label>
                        <a href="forgot-password.html" class="forgot-link">هل نسيت كلمة المرور؟</a>
                    </div>
                    <input type="password" id="loginPassword" class="form-control" placeholder="********" required>
                    <div class="error-message d-none" id="passwordError">يجب أن لا تقل كلمة المرور عن 6 حروف وأرقام.</div>
                </div>
                
                <button type="submit" class="btn btn-gold w-100 mt-3">دخول</button>

                <div class="divider">أو</div>
                
                <button type="button" id="googleLoginBtn" class="btn btn-google">
                    <i class="bi bi-google"></i> تسجيل الدخول باستخدام Google
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="small mb-0">ليس لديك حساب؟ <a href="register.html">أنشئ حسابك الآن</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            document.getElementById('emailError').classList.add('d-none');
            document.getElementById('passwordError').classList.add('d-none');
            
            const statusAlert = document.getElementById('formStatusAlert');
            statusAlert.classList.add('d-none');
            statusAlert.className = 'alert d-none mb-3 text-center';

            let hasError = false;
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').classList.remove('d-none');
                document.getElementById('loginEmail').focus();
                hasError = true;
            }

            if (password.length < 6) {
                document.getElementById('passwordError').classList.remove('d-none');
                if(!hasError) document.getElementById('loginPassword').focus();
                hasError = true;
            }

            if (hasError) return;

            try {
                const res = await fetch('/api/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    statusAlert.classList.remove('d-none');
                    statusAlert.style.cssText = "background-color: rgba(40, 167, 69, 0.2); color: #2ecc71; border: 1px solid #2ecc71;";
                    statusAlert.innerText = 'تم تسجيل الدخول بنجاح! جاري التوجيه للوحة التحكم...';
                    
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    statusAlert.classList.remove('d-none');
                    statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                    statusAlert.innerText = data.message || 'بيانات الدخول غير صحيحة.';
                }
            } catch (error) {
                console.error('Login Error:', error);
                statusAlert.classList.remove('d-none');
                statusAlert.style.cssText = "background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #ff6b6b;";
                statusAlert.innerText = 'تعذر الاتصال بالسيرفر، تأكد من تشغيل الباك أند عبر vercel dev.';
            }
        };

        document.getElementById('googleLoginBtn').onclick = () => {
            const statusAlert = document.getElementById('formStatusAlert');
            statusAlert.className = 'alert mb-3 text-center';
            statusAlert.classList.remove('d-none');
            statusAlert.style.cssText = "background-color: rgba(255, 193, 7, 0.15); color: #f1c40f; border: 1px solid #f1c40f;";
            statusAlert.innerText = 'جاري التوجيه لحساب جوجل الخاص بك للتحقق...';
        };
    </script>
</body>
</html>
