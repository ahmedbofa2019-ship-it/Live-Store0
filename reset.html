<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة - Live Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 280 70%22><text x=%2250%%22 y=%2248%22 font-size=%2242%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22%23d4af37%22 text-anchor=%22middle%22>Live Store</text></svg>">
    <style>
        body { 
            background-color: #121212; 
            color: #d4af37 !important; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
        }
        .card { 
            background-color: #1a1a1a; 
            border: 1px solid #d4af37; 
            border-radius: 15px; 
            padding: 50px !important; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15) !important; 
            width: 100%; 
            max-width: 650px; 
            margin: auto; 
        }
        .form-control { 
            background-color: #262626 !important; 
            border: 1px solid #444 !important; 
            color: #ffffff !important; /* لون النص المكتوب أبيض للوضوح */
            padding: 15px; 
            font-size: 1rem;
        }
        /* 🌟 تنسيق الـ Placeholder باللون الرمادي */
        .form-control::placeholder {
            color: #888 !important; 
            opacity: 1; /* لضمان ظهور اللون في كل المتصفحات */
        }
        .form-control:focus { 
            background-color: #2d2d2d !important; 
            border-color: #d4af37 !important; 
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.2);
        }
        .btn-gold { 
            background-color: #d4af37; 
            color: #121212; 
            font-weight: bold; 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-gold:hover { background-color: #f3e5ab; }
        label { color: #d4af37 !important; font-weight: 600; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card shadow">
            <h2 class="text-center fw-bold mb-4" style="color: #d4af37;">تعيين كلمة مرور جديدة</h2>
            
            <div class="mb-4">
                <label class="form-label">كلمة المرور الجديدة</label>
                <input type="password" id="newPassword" class="form-control" placeholder="أدخل كلمة المرور الجديدة">
            </div>
            
            <div class="mb-4">
                <label class="form-label">تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="أعد كتابة كلمة المرور">
            </div>
            
            <button id="saveBtn" onclick="updatePassword()" class="btn btn-gold">حفظ التغييرات</button>
            <p id="msg" class="mt-4 text-center fw-bold"></p>
        </div>
    </div>

    <script>
        async function updatePassword() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('msg');
            const saveBtn = document.getElementById('saveBtn');
            
            if (password.length < 6) {
                msg.innerText = "كلمة المرور يجب أن تكون 6 خانات على الأقل";
                msg.style.color = "#ff6b6b";
                return;
            }

            if (password !== confirm) {
                msg.innerText = "كلمات المرور غير متطابقة!";
                msg.style.color = "#ff6b6b";
                return;
            }

            const resetToken = localStorage.getItem('resetToken');
            if (!resetToken) {
                msg.innerText = "انتهت صلاحية الجلسة، يرجى إعادة طلب الرمز.";
                msg.style.color = "#ff6b6b";
                return;
            }

            saveBtn.disabled = true;
            msg.style.color = "#d4af37";
            msg.innerText = "جاري الحفظ...";

            try {
              const res = await fetch('https://live-store0.vercel.app/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password: password })
                });

                // 🌟 التحقق من نجاح طلب السيرفر قبل محاولة قراءة الـ JSON لمنع انهيار الـ Fetch
              if (!res.ok) {
    const errorData = await res.json();
    msg.style.color = "#ff6b6b";
    msg.innerText = errorData.message || "خطأ من السيرفر";
    saveBtn.disabled = false;
    return;
}

                const data = await res.json();
                
                if (data.success) {
                    msg.style.color = "#2ecc71";
                    msg.innerText = "تم تغيير كلمة المرور بنجاح! سيتم تحويلك...";
                    localStorage.removeItem('resetToken');
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    msg.style.color = "#ff6b6b";
                    msg.innerText = data.message || "حدث خطأ غير متوقع.";
                    saveBtn.disabled = false;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                msg.style.color = "#ff6b6b";
                msg.innerText = "حدث خطأ في الاتصال بالسيرفر، حاول مجدداً.";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
