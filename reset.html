<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة - Live Store</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #161616;
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            color: #d4af37;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #222222;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #d4af37;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #d4af37;
            color: #0b0b0b;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #bc962e;
        }

        button:disabled {
            background-color: #555555;
            color: #aaaaaa;
            cursor: not-allowed;
        }

        #message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>تعيين كلمة مرور جديدة</h2>
        <form id="resetForm">
            <div class="form-group">
                <label for="password">كلمة المرور الجديدة</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" placeholder="••••••" required>
            </div>
            <button type="submit" id="saveBtn">حفظ التغييرات</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // 1. استخراج التوكن من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const form = document.getElementById('resetForm');
        const msg = document.getElementById('message');
        const saveBtn = document.getElementById('saveBtn');

        // تنبيه فوري لو الرابط مفيهوش التوكن
        if (!token) {
            msg.style.color = "#ff6b6b";
            msg.innerText = "⚠️ خطأ: الرابط لا يحتوي على رمز التحقق (token). يرجى الضغط على الرابط المرسل إلى بريدك الإلكتروني بالكامل.";
            saveBtn.disabled = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                msg.style.color = "#ff6b6b";
                msg.innerText = "كلمتا المرور غير متطابقتين!";
                return;
            }

            if (password.length < 6) {
                msg.style.color = "#ff6b6b";
                msg.innerText = "يجب ألا تقل كلمة المرور عن 6 أحرف.";
                return;
            }

            saveBtn.disabled = true;
            msg.style.color = "#d4af37";
            msg.innerText = "جاري حفظ التغييرات...";

            try {
                // إرسال مباشر إلى مسار السيرفر على Vercel
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token, password })
                });

                // قراءة الرد كـ نص أولاً لضمان عدم حدوث كراش لو السيرفر وقع
                const responseText = await res.text();
                let data;
                
                try {
                    data = JSON.parse(responseText);
                } catch(e) {
                    // لو السيرفر رجع HTML خطأ من Vercel يظهر هنا
                    msg.style.color = "#ff6b6b";
                    msg.innerText = "السيرفر واجه مشكلة داخلية (500). راجع الـ Logs في Vercel.";
                    saveBtn.disabled = false;
                    return;
                }

                if (res.ok && data.success) {
                    msg.style.color = "#2ecc71";
                    msg.innerText = data.message || "تم تغيير كلمة المرور بنجاح!";
                    form.style.display = "none";
                } else {
                    msg.style.color = "#ff6b6b";
                    msg.innerText = data.message || "فشل في تعيين كلمة المرور الجديدة.";
                    saveBtn.disabled = false;
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                msg.style.color = "#ff6b6b";
                msg.innerText = "حدث خطأ في الاتصال بالشبكة، تحقق من اتصالك وحاول مجدداً.";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
