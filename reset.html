<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }
        /* هنا كبرنا البوكس وزودنا المسافات */
        .container { 
            background-color: #161616; 
            padding: 60px 50px; 
            border: 1px solid #d4af37; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 550px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center; 
        }
        h2 { color: #d4af37; margin-bottom: 30px; }
        input { 
            width: 100%; 
            padding: 18px; 
            margin: 15px 0; 
            background: #222; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 10px; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 18px; 
            margin-top: 20px;
            background: #d4af37; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px;
            border-radius: 10px;
        }
        #message { margin-top: 25px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>تعيين كلمة مرور جديدة</h2>
        <form id="resetForm">
            <input type="password" id="password" placeholder="كلمة المرور الجديدة" required>
            <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
            <button type="submit">حفظ التغييرات</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const msg = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const token = new URLSearchParams(window.location.search).get('token');

            if (password !== confirm) return msg.innerText = "كلمتا المرور غير متطابقتين";
            
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                msg.innerText = data.message;
                msg.style.color = data.success ? "#2ecc71" : "#ff6b6b";
            } catch (err) {
                msg.innerText = "خطأ في الاتصال بالسيرفر";
                msg.style.color = "#ff6b6b";
            }
        });
    </script>
</body>
</html>
